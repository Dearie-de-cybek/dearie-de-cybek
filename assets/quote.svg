<g class="pf" style="animation-duration:17.7s;animation-delay:-13.8s;--dx:18px;--rot:400deg" transform="translate(62.0,0)"><path d="M6.5,0 C11,3 11.5,10 6.5,15 C1.5,10 2,3 6.5,0 Z" fill="url(#petal)" fill-opacity="0.3" transform="scale(1.21)"/></g>
<g class="pf" style="animation-duration:19.6s;animation-delay:-15.4s;--dx:-10px;--rot:280deg" transform="translate(71.7,0)"><path d="M6.5,0 C11,3 11.5,10 6.5,15 C1.5,10 2,3 6.5,0 Z" fill="url(#petal)" fill-opacity="0.46" transform="scale(0.55)"/></g>
