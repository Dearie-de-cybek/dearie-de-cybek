      0%{transform:translate(0,-20px) rotate(0deg);opacity:0}
      12%{opacity:.7}
      88%{opacity:.7}
      100%{transform:translate(var(--dx,18px),324px) rotate(var(--rot,320deg));opacity:0}
    }</style>
