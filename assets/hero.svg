<g class="pf" style="animation-duration:13.8s;animation-delay:-20.2s;--dx:-16px;--rot:280deg" transform="translate(124.5,0)"><path d="M6.5,0 C11,3 11.5,10 6.5,15 C1.5,10 2,3 6.5,0 Z" fill="url(#petal)" fill-opacity="0.3" transform="scale(0.55)"/></g></g>

  <!-- text block -->
  <g transform="translate(56,118)">
    <rect x="0" y="-26" width="20" height="7" rx="3" fill="#8fc07a"/>
    <text x="30" y="-19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="13" letter-spacing="2" fill="#f48fb1">// kisatsutai · software engineer</text>
    <text x="-2" y="78" font-family="'Yu Mincho','Hiragino Mincho ProN','Zen Old Mincho','Songti SC',serif" font-size="116" font-weight="700" fill="url(#title)" letter-spacing="-1">Dearie</text>
    <text x="2" y="120" font-family="'Yu Mincho','Hiragino Mincho ProN','Zen Old Mincho','Songti SC',serif" font-size="23" fill="#f1eaef">Full-stack developer &amp; interface artisan</text>
    <text x="2" y="156" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="14.5" fill="#f48fb1">I build calm systems under pressure<tspan class="cur" fill="#e8a86a">▌</tspan></text>
    <g transform="translate(2,184)" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="12.5">
      <circle class="pulse" cx="6" cy="-4" r="5" fill="#8fc07a"/>
      <text x="18" y="0" fill="#a99fb0">open to missions · total concentration · remote-first</text>
    </g>
