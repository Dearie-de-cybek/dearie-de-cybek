<g class="pf" style="animation-duration:11.9s;animation-delay:-10.6s;--dx:-16px;--rot:360deg" transform="translate(66.3,0)"><path d="M6.5,0 C11,3 11.5,10 6.5,15 C1.5,10 2,3 6.5,0 Z" fill="url(#petal)" fill-opacity="0.3" transform="scale(0.99)"/></g>
