name: Daily refresh — quote + GitHub stats

# Each day: picks a new Japanese proverb AND fetches live GitHub stats
# (stars, commits, PRs, issues, reviews, top languages, streak, activity)
# straight from the GraphQL API, then re-renders quote.svg + telemetry.svg.
# Enable Actions (Settings ▸ Actions ▸ Allow). GITHUB_TOKEN is automatic.
on:
  schedule:
    - cron: "0 21 * * *"   # 06:00 JST (21:00 UTC)
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate quote + live stats
        env:
          GH_USER: dearie                      # TODO: set to the real GitHub username
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python build_svgs.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/quote.svg assets/telemetry.svg
          if git diff --cached --quiet; then
            echo "No change today."
          else
            git commit -m "chore: daily quote + GitHub stats 🌸"
            git push
          fi
